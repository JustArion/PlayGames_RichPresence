name: Pre-Release_on_Tag

on:
  push:
    tags:
      - 'p*'

permissions:
  contents: write

jobs:
  windows-latest:
    name: windows-latest
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          lfs: true
      - name: 'Cache: ~/.nuget/packages'
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
          key: ${{ runner.os }}-${{ hashFiles('**/global.json', '**/*.csproj', '**/Directory.Packages.props', '**/packages.lock.json') }}
      - name: 'Run: TaggedPreRelease'
        run: ./build.cmd TaggedPreRelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: 'Publish: bin'
        uses: actions/upload-artifact@v5
        with:
          name: bin
          path: bin
      - name: 'Publish: velopack'
        uses: actions/upload-artifact@v5
        with:
          name: velopack
          path: velopack
